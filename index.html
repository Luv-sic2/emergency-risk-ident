<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>校园安全风险AI全真识别指挥调度系统</title>
    <style>
        :root { --primary: #ef4444; --accent: #38bdf8; --bg: #090d16; --card: #141b2d; --border: #1e293b; --text: #e2e8f0; --text-muted: #64748b; }
        
        body { margin:0; padding:0; background: var(--bg); font-family: 'SF Pro Display', -apple-system, 'PingFang SC', sans-serif; color: var(--text); -webkit-font-smoothing: antialiased; }
        
        /* 通用科技风容器 */
        .container { width:95%; max-width:1400px; margin:20px auto; display: flex; flex-direction: column; gap: 20px; }
        
        /* 1. 顶部标题栏 COMMAND HEADER */
        .header { background: var(--card); border: 1px solid var(--border); padding: 15px 30px; border-radius: 12px; display: flex; align-items: center; justify-content: space-between; box-shadow: 0 4px 20px rgba(0,0,0,0.5); }
        .header h1 { color: var(--accent); margin: 0; font-size: 22px; letter-spacing: 1px; font-weight: 700; display: flex; align-items: center; gap: 10px; }
        .header .live-badge { background: rgba(56,189,248,0.1); color: var(--accent); padding: 5px 12px; border-radius: 20px; font-size: 12px; border: 1px solid rgba(56,189,248,0.2); font-family: monospace; letter-spacing: 1px; animation: pulse 2s infinite; }
        
        /* 2. 核心区布局 MAIN LAYOUT */
        .main-grid { display: grid; grid-template-columns: 1fr; gap: 20px; }
        @media (min-width: 900px) { .main-grid { grid-template-columns: 380px 1fr; } }
        
        /* 通用面板风格 PANEL STYLE */
        .panel { background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 25px; display: flex; flex-direction: column; box-sizing: border-box; }
        .panel-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px; border-bottom: 1px solid var(--border); padding-bottom: 15px; }
        .panel-title { font-size: 14px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 2px; font-weight: 600; }
        
        /* 左侧：视觉采集面板 VISUAL ACQUISITION */
        #upload-panel { gap: 15px; }
        
        /* 高科技图片采集框 */
        .scan-zone { position: relative; border: 2px dashed #334155; border-radius: 12px; min-height: 250px; display: flex; align-items: center; justify-content: center; overflow: hidden; transition: 0.3s; background: rgba(15,23,42,0.3); }
        .scan-zone:hover { border-color: var(--accent); background: rgba(56,189,248,0.02); }
        .scan-zone input[type="file"] { position: absolute; width: 100%; height: 100%; top:0; left:0; opacity: 0; cursor: pointer; }
        
        #preview-img { display: none; width: 100%; height: 100%; object-fit: cover; transition: 0.5s; }
        
        /* 上传占位 UI */
        .upload-placeholder { text-align: center; color: var(--text-muted); display: flex; flex-direction: column; align-items: center; gap: 10px; }
        .upload-placeholder .icon { font-size: 40px; color: #334155; }
        .scan-zone:hover .icon { color: var(--accent); }
        
        /* 警报分析按钮 */
        .btn-analyze { background: var(--primary); color: white; border: none; padding: 16px; border-radius: 8px; font-size: 16px; font-weight: bold; cursor: pointer; width: 100%; transition: 0.2s; letter-spacing: 1px; box-shadow: 0 4px 14px rgba(239,68,68,0.4); display: flex; align-items: center; justify-content: center; gap: 10px; }
        .btn-analyze:hover { background: #dc2626; transform: translateY(-1px); }
        .btn-analyze:disabled { background: #334155; color: var(--text-muted); cursor: not-allowed; box-shadow: none; transform: none; }
        
        /* 右侧：报告推演面板 LOGIC DEDUCTION */
        #report-panel { min-height: 500px; }
        
        /* 高科技报告显示区 */
        #result-area { display: none; }
        #result-text { background: #070a12; padding: 30px; border-radius: 8px; border: 1px solid var(--border); color: #cbd5e1; line-height: 1.8; font-size: 15px; white-space: pre-wrap; font-family: 'Consolas', 'Monaco', 'PingFang SC', sans-serif; position: relative; overflow-x: auto; }
        
        /* 报告区域的伪元素光效 */
        #result-text::before { content: ""; position: absolute; top:0; left:0; width:4px; height: 100%; background: var(--accent); border-radius: 4px; }
        
        /* 正在解算占位 */
        #report-placeholder { display: flex; flex-direction: column; align-items: center; justify-content: center; flex:1; text-align: center; color: var(--text-muted); font-size: 14px; gap: 15px; }
        .scan-bar { width: 150px; height: 2px; background: #334155; position: relative; overflow: hidden; }
        .scan-bar::after { content: ""; position: absolute; left: 0; top:0; width: 50%; height: 100%; background: var(--accent); animation: scanLoop 1.5s infinite; }

        @keyframes scanLoop { from { left: -50%; } to { left: 100%; } }
        @keyframes pulse { 0% { opacity: 0.6; } 50% { opacity: 1; } 100% { opacity: 0.6; } }

    </style>
</head>
<body>

    <div class="container">
        
        <header class="header">
            <h1>🚨 CAMPUS SAFETY AI CENTER</h1>
            <div class="live-badge">LIVE // MULTIMODAL NODE</div>
        </header>

        <div class="main-grid">
            
            <aside class="panel" id="upload-panel">
                <div class="panel-header">
                    <span class="panel-title">Visual Acquisition</span>
                </div>
                
                <div class="scan-zone">
                    <input type="file" id="file-input" accept="image/*">
                    <div class="upload-placeholder" id="placeholder-ui">
                        <div class="icon">📸</div>
                        <div style="font-size: 15px; color: var(--text);">视界载入点</div>
                        <div style="font-size: 12px;">点击选择或拖拽现场照片</div>
                    </div>
                    <img id="preview-img" src="#" alt="视觉流预览">
                </div>
                
                <button class="btn-analyze" id="start-btn">⚠️ 启动视觉解算推理</button>
            </aside>
            
            <main class="panel" id="report-panel">
                <div class="panel-header">
                    <span class="panel-title">AI Logic Deduction</span>
                </div>
                
                <div id="report-placeholder">
                    <div class="icon" style="font-size: 30px;">🕵️‍♂️</div>
                    <div>上传现场视觉数据<br>激活应急管理 AI 推理节点</div>
                </div>
                
                <div id="loading-placeholder" style="display: none;">
                    <div id="report-placeholder">
                        <div class="scan-bar"></div>
                        <div>正在提取图像高维特征...<br>呼叫国内视觉节点进行全真风险解算</div>
                    </div>
                </div>

                <div id="result-area">
                    <div id="result-text"></div>
                </div>
            </main>

        </div>
    </div>

    <script>
        const fileInput = document.getElementById('file-input');
        const previewImg = document.getElementById('preview-img');
        const placeholderUi = document.getElementById('placeholder-ui');
        const btn = document.getElementById('start-btn');
        
        const placeholderRep = document.getElementById('report-placeholder');
        const loadingRep = document.getElementById('loading-placeholder');
        const resultArea = document.getElementById('result-area');
        const resultText = document.getElementById('result-text');

        let base64Data = ""; 

        // 核心流程：1. 载入预览图片 (和现在一样)
        fileInput.onchange = function() {
            const file = fileInput.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    previewImg.src = e.target.result;
                    previewImg.style.display = "block";
                    placeholderUi.style.display = "none"; // 隐藏占位框
                    // 强力提取干净的 base64 字符串
                    base64Data = e.target.result.split(',')[1];
                };
                reader.readAsDataURL(file);
            }
        };

        // 核心流程：3. 动效与请求
        function startTypingEffect(text) {
            let i = 0;
            resultText.innerText = "";
            const timer = setInterval(() => {
                resultText.innerText += text[i];
                i++;
                if (i >= text.length) {
                    clearInterval(timer);
                    btn.disabled = false;
                    btn.innerText = "重新分析新场景";
                }
                // 自动向下滚动，更有黑客感
                resultArea.scrollIntoView({ behavior: "smooth", block: "end" });
            }, 8);
        }

        btn.onclick = async function() {
            if (!base64Data) {
                alert("请先载入校园现场采集照片！");
                return;
            }

            btn.disabled = true;
            btn.innerText = "⚡ 正在计算特征，请勿切断连接...";
            
            // 切换报告区的状态 UI
            placeholderRep.style.display = "none";
            resultArea.style.display = "none";
            loadingRep.style.display = "block";

            try {
                const response = await fetch('/api/check', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ image: base64Data })
                });

                const result = await response.json();

                // 切换报告区为文字输出模式
                loadingRep.style.display = "none";

                if (response.ok && result.content) {
                    resultArea.style.display = "block";
                    startTypingEffect(result.content);
                } else {
                    placeholderRep.style.display = "block"; // 切回占位符
                    alert("⚠️ 错误提示：" + (result.content || "未知技术故障"));
                    btn.disabled = false;
                    btn.innerText = "重试";
                }
            } catch (err) {
                loadingRep.style.display = "none";
                placeholderRep.style.display = "block";
                alert("❌ 无法连接到应急云中转节点，请检查 Deployment 状态。");
                btn.disabled = false;
                btn.innerText = "重试";
            }
        };
    </script>
</body>
</html>
