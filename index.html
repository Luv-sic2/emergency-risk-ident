<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>校园安全 AI 视觉中心</title>
    <style>
        :root {
            /* 苹果官网标志性配色 */
            --bg: #f5f5f7; /* 苹果经典的浅暖灰背景 */
            --panel: #ffffff; /* 纯白卡片 */
            --header-bg: rgba(245, 245, 247, 0.7); /* 毛玻璃导航背景 */
            --accent-blue: #0071e3; /* 苹果标准蓝色 */
            --accent-red: #ff3b30; /* 苹果标准红色 (用于警报) */
            --text-main: #1d1d1f; /* 苹果字体主要颜色：深碳黑 */
            --text-secondary: #86868b; /* 苹果次要文字颜色：灰色 */
            --border: #d2d2d7; /* 极浅的分隔线颜色 */
            --shadow: 0 8px 30px rgba(0, 0, 0, 0.04); /* 苹果式极轻投影 */
        }

        body {
            margin: 0; padding: 0; background: var(--bg);
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "SF Pro Display", "PingFang SC", "Helvetica Neue", Arial, sans-serif;
            color: var(--text-main); -webkit-font-smoothing: antialiased;
            min-height: 100vh; display: flex; flex-direction: column;
        }

        /* 顶部导航：Apple 毛玻璃风格 */
        .app-header {
            position: sticky; top: 0; z-index: 100;
            background: var(--header-bg); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            border-bottom: 0.5px solid var(--border); padding: 16px 0;
        }
        .header-content {
            width: 92%; max-width: 1200px; margin: 0 auto;
            display: flex; align-items: center; justify-content: space-between;
        }
        .header-content h1 {
            margin: 0; font-size: 19px; font-weight: 600; letter-spacing: -0.5px;
        }
        .status-dot {
            display: inline-block; width: 8px; height: 8px; background: #34c759; /* 苹果健康绿 */
            border-radius: 50%; margin-right: 6px;
        }
        .status-text { font-size: 13px; color: var(--text-secondary); font-weight: 400; }

        /* 主容器布局 */
        .app-container {
            width: 92%; max-width: 1200px; margin: 40px auto;
            display: grid; grid-template-columns: 1fr; gap: 30px; flex: 1;
        }
        @media (min-width: 900px) {
            .app-container { grid-template-columns: 380px 1fr; }
        }

        /* 苹果风悬浮卡片 */
        .apple-card {
            background: var(--panel); border-radius: 20px; padding: 32px;
            box-shadow: var(--shadow); border: 0.5px solid rgba(0,0,0,0.05);
            display: flex; flex-direction: column; box-sizing: border-box;
        }

        .card-title {
            font-size: 13px; font-weight: 600; color: var(--text-secondary);
            text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 24px;
        }

        /* 图片上传区：更加克制、简洁 */
        .upload-viewport {
            width: 100%; height: 280px; position: relative;
            background: #fbfbfd; border: 1px solid var(--border);
            border-radius: 14px; overflow: hidden; transition: all 0.3s ease;
            display: flex; align-items: center; justify-content: center;
        }
        .upload-viewport:hover { background: #f5f5f7; border-color: #afafb6; }
        .upload-viewport input[type="file"] {
            position: absolute; width: 100%; height: 100%; top:0; left:0; opacity: 0; cursor: pointer; z-index: 10;
        }
        #preview-img {
            width: 100%; height: 100%; object-fit: contain; display: none; z-index: 5;
        }
        .upload-icon-ui { text-align: center; color: var(--text-secondary); }
        .upload-icon-ui .icon { font-size: 32px; margin-bottom: 12px; display: block; opacity: 0.6; }

        /* 苹果标准蓝色按钮 */
        .apple-btn {
            background: var(--accent-blue); color: #fff; border: none;
            padding: 14px 20px; border-radius: 12px; font-size: 15px; font-weight: 500;
            cursor: pointer; width: 100%; margin-top: 24px; transition: all 0.2s ease;
        }
        .apple-btn:hover { background: #0077ed; transform: scale(1.01); }
        .apple-btn:active { transform: scale(0.98); opacity: 0.9; }
        .apple-btn:disabled { background: #e5e5ea; color: #a1a1a6; cursor: not-allowed; transform: none; }

        /* 右侧内容展示区 */
        .content-display { min-height: 500px; position: relative; }
        #idle-msg {
            margin: auto; text-align: center; color: var(--text-secondary);
        }
        #idle-msg h3 { font-size: 22px; color: #d2d2d7; font-weight: 600; margin: 0; }

        /* 苹果风报告排版 */
        #result-text {
            color: var(--text-main); line-height: 1.7; font-size: 16px;
            white-space: pre-wrap; font-weight: 400;
        }
        #result-text strong { font-weight: 600; color: #000; }

        /* 加载动效：极其轻微的呼吸感 */
        .loading-dots { display: none; margin: 20px 0; color: var(--text-secondary); font-size: 14px; }
        .dot-pulse { animation: dotPulse 1.5s infinite ease-in-out; }
        @keyframes dotPulse { 0%, 100% { opacity: 0.3; } 50% { opacity: 1; } }

        .footer {
            padding: 40px 0; text-align: center; color: var(--text-secondary);
            font-size: 12px; font-weight: 400;
        }
    </style>
</head>
<body>

    <header class="app-header">
        <div class="header-content">
            <h1>校园安全 AI 视觉中心</h1>
            <div class="status">
                <span class="status-dot"></span>
                <span class="status-text">视觉识别节点已就绪</span>
            </div>
        </div>
    </header>

    <div class="app-container">
        
        <aside class="apple-card">
            <div class="card-title">视觉载入</div>
            <div class="upload-viewport">
                <input type="file" id="file-input" accept="image/*">
                <div class="upload-icon-ui" id="ui-placeholder">
                    <span class="icon">📷</span>
                    <div style="font-size: 14px; font-weight: 500;">选取现场照片</div>
                    <div style="font-size: 12px; margin-top: 4px; opacity: 0.8;">支持拖拽或点击上传</div>
                </div>
                <img id="preview-img" src="#" alt="预览图片">
            </div>
            
            <button class="apple-btn" id="start-btn">开始分析报告</button>
        </aside>
        
        <main class="apple-card content-display">
            <div class="card-title">隐患评估推演</div>
            
            <div id="idle-msg">
                <h3>分析就绪</h3>
                <p style="font-size: 14px;">请在左侧载入照片并点击开始分析</p>
            </div>

            <div class="loading-dots" id="loading-ui">
                <span class="dot-pulse">正在解析图像特征并生成专业建议...</span>
            </div>

            <div id="result-area" style="display: none;">
                <div id="result-text"></div>
            </div>
        </main>

    </div>

    <footer class="footer">
        © 2024 应急管理课题演示系统 · 高级多模态视觉解算引擎
    </footer>

    <script>
        const fileInput = document.getElementById('file-input');
        const previewImg = document.getElementById('preview-img');
        const uiPlaceholder = document.getElementById('ui-placeholder');
        const btn = document.getElementById('start-btn');
        
        const idleMsg = document.getElementById('idle-msg');
        const loadingUi = document.getElementById('loading-ui');
        const resultArea = document.getElementById('result-area');
        const resultText = document.getElementById('result-text');

        let base64Data = ""; 

        // 核心流程 1：载入预览
        fileInput.onchange = function() {
            const file = fileInput.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    previewImg.src = e.target.result;
                    previewImg.style.display = "block";
                    uiPlaceholder.style.display = "none";
                    base64Data = e.target.result.split(',')[1];
                };
                reader.readAsDataURL(file);
            }
        };

        // 核心流程 2：顺滑打字效果
        function startTypingEffect(text) {
            let i = 0;
            resultText.innerText = "";
            const timer = setInterval(() => {
                resultText.innerText += text[i];
                i++;
                if (i >= text.length) {
                    clearInterval(timer);
                    btn.disabled = false;
                    btn.innerText = "开始分析报告";
                }
            }, 12); 
        }

        // 核心流程 3：提交分析
        btn.onclick = async function() {
            if (!base64Data) {
                alert("请先载入现场采集照片。");
                return;
            }

            btn.disabled = true;
            btn.innerText = "正在分析...";
            
            idleMsg.style.display = "none";
            resultArea.style.display = "none";
            loadingUi.style.display = "block";

            try {
                const response = await fetch('/api/check', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ image: base64Data })
                });

                const result = await response.json();

                loadingUi.style.display = "none";

                if (response.ok && result.content) {
                    resultArea.style.display = "block";
                    startTypingEffect(result.content);
                } else {
                    idleMsg.style.display = "block";
                    alert("错误：未能成功解析图片，请检查后台配置。");
                    btn.disabled = false;
                    btn.innerText = "开始分析报告";
                }
            } catch (err) {
                loadingUi.style.display = "none";
                idleMsg.style.display = "block";
                alert("连接故障：无法触达 AI 解算节点。");
                btn.disabled = false;
                btn.innerText = "开始分析报告";
            }
        };
    </script>
</body>
</html>
